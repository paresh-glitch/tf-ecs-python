name: Destroy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to destroy"
        required: true
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    env:
      TF_VAR_env: ${{ github.event.inputs.environment }}
      TF_VAR_db_password: ${{ secrets.PASS }}
      TF_VAR_vpc_cidr: ${{ vars.TF_VAR_vpc_cidr }}
      TF_VAR_vpc_name: ${{ vars.TF_VAR_vpc_name }}
      TF_VAR_public_subnet_cidrs: ${{ vars.TF_VAR_public_subnet_cidrs }}
      TF_VAR_private_subnet_cidrs: ${{ vars.TF_VAR_private_subnet_cidrs }}
      TF_VAR_azs: ${{ vars.TF_VAR_azs }}
      TF_VAR_alb_name: ${{ vars.TF_VAR_alb_name }}
      TF_VAR_cluster_name: ${{ vars.TF_VAR_cluster_name }}
      TF_VAR_db_user: ${{ vars.TF_VAR_db_user }}
      TF_VAR_db_name: ${{ vars.TF_VAR_db_name }}
      TF_VAR_repo_names: ${{ vars.TF_VAR_repo_names }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::030635937630:role/github-actions-role
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend-config="key=${{ env.TF_VAR_env }}/ecs/terraform.tfstate"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
